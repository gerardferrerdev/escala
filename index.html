<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala de Atividades</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>

<div class="container">
    <h1>📋 Escala de Atividades</h1>

    <div class="input-box">
        <input type="text" id="nomeInput" placeholder="Nome do participante...">
        <button class="btn btn-add" onclick="adicionar()">Adicionar</button>
    </div>

    <div class="week-display">
        <button class="btn btn-nav" onclick="navegarSemana(-1)">⬅</button>
        <strong id="txtSemana">Semana 1</strong>
        <button class="btn btn-nav" onclick="navegarSemana(1)">➡</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>PARTICIPANTE</th>
                <th>ATIVIDADE</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>

    <div class="sync-section">
        <button class="btn btn-sync" onclick="exportarDados()">📤 Copiar Código do Grupo</button>
        <button class="btn btn-sync btn-secondary" onclick="importarDados()">📥 Importar via Código</button>
    </div>
    <button class="btn-reset" onclick="resetarTudo()">Limpar todos os dados e reiniciar</button>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
